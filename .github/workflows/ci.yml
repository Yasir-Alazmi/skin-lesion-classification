name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8

      - name: black — format check
        run: black --check --diff src/

      - name: isort — import order check
        run: isort --check-only --diff src/

      - name: flake8 — lint
        run: flake8 src/ --max-line-length=100 --extend-ignore=E203,W503

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-

      - name: Install CPU-only dependencies
        run: |
          python -m pip install --upgrade pip
          # Install torch CPU-only for CI (faster, no GPU needed)
          pip install torch==2.1.0 torchvision==0.16.0 --index-url https://download.pytorch.org/whl/cpu
          pip install timm==0.9.12 numpy pandas scikit-learn opencv-python Pillow matplotlib seaborn tqdm
          pip install pytest
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v --tb=short

  validate-structure:
    name: Validate Repository Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking required files..."
          for f in README.md LICENSE requirements.txt pyproject.toml CONTRIBUTING.md CHANGELOG.md \
                   src/config.py src/dataset.py src/models.py src/train.py src/evaluate.py \
                   src/visualize.py src/preprocess.py src/loss.py; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing: $f"
              exit 1
            else
              echo "✅ Found: $f"
            fi
          done
